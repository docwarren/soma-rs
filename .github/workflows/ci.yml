name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Runs on every push and PR — no cloud credentials needed
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Unit tests
        run: cargo test -p seqa_core --lib

      - name: Read / CIGAR tests
        run: cargo test -p seqa_core --test read

      - name: Local store test
        run: cargo test -p seqa_core --test local

      - name: Rocket tests
        run: |
          cargo test -p seqa_rocket test_index
          cargo test -p seqa_rocket test_search_unsupported_file_type
          cargo test -p seqa_rocket test_search_missing_coordinates
          cargo test -p seqa_rocket test_search_invalid_json
          cargo test -p seqa_rocket test_404

  # Runs on pull requests and pushes ot main
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    environment: TEST
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}
      AZURE_STORAGE_ACCESS_KEY: ${{ secrets.AZURE_STORAGE_ACCESS_KEY }}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
      GOOGLE_BUCKET: ${{ secrets.GOOGLE_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: seqa_core cloud tests
        run: |
          cargo test -p seqa_core --test bam
          cargo test -p seqa_core --test tabix
          cargo test -p seqa_core --test bigwig
          cargo test -p seqa_core --test bigbed
          cargo test -p seqa_core --test obj_store

      - name: seqa_rocket cloud tests
        run: |
          cargo test -p seqa_rocket test_search_vcf
          cargo test -p seqa_rocket test_list_files_s3
